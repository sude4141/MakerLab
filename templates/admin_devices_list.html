<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MakerLab - Cihaz Yönetimi (Yönetici)</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon"><i class="fas fa-cube"></i></div>
                <span class="sidebar-logo-text">MakerLab</span>
            </div>
            <nav>
                <a href="/admin" class="nav-link"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="/admin/cihazlar" class="nav-link active"><i class="fas fa-print"></i><span>Cihazlar</span></a>
                <a href="/admin/talepler" class="nav-link"><i class="fas fa-clipboard-list"></i><span>İş Talepleri</span></a>
            </nav>
            <div class="user-info">
                <div class="user-info-name">{{ kullanici.ad_soyad }}</div>
                <div class="user-info-role">Yönetici</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Cihaz Yönetimi</h1>
                <form action="/admin/cihaz-ekle" method="POST" style="margin-top: 10px;">
                    <input type="text" name="marka_model" placeholder="Yeni Cihaz Adı" class="form-control" style="width: 200px; display: inline-block;" required>
                    <input type="text" name="kisa_aciklama" placeholder="Kısa açıklama (müşteri bilgisi)" class="form-control" style="width: 320px; display: inline-block;">
                    <button type="submit" class="btn btn-primary" style="width: auto; padding: 10px 20px;">Ekle</button>
                </form>
            </div>
            <div class="card">
                <div class="card-body" style="padding: 0;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Cihaz ID</th>
                                <th>Marka / Model</th>
                                <th>Açıklama</th>
                                <th>Durum</th>
                                <th>İşlemler</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for cihaz in cihazlar %}
                            <tr>
                                <td>#{{ cihaz.id }}</td>
                                <td>{{ cihaz.marka_model }}</td>
                                <td style="max-width: 420px;">
                                    <form action="/admin/cihaz-aciklama/{{ cihaz.id }}" method="POST" style="display: flex; gap: 6px; align-items: flex-start;">
                                        <textarea name="kisa_aciklama" class="form-control" rows="2" style="font-size: 13px; flex: 1;" placeholder="Müşteri için kısa açıklama...">{{ cihaz.kisa_aciklama }}</textarea>
                                        <button type="submit" class="btn btn-sm btn-primary" title="Açıklamayı kaydet"><i class="fas fa-save"></i></button>
                                    </form>
                                </td>
                                <td><span class="badge badge-info">{{ cihaz.durum }}</span></td>
                                <td>
                                    <form action="/admin/cihaz-sil/{{ cihaz.id }}" method="POST" onsubmit="return confirm('Silmek istediğinize emin misiniz?');">
                                        <button type="submit" class="btn btn-sm btn-danger">Sil</button>
                                    </form>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
